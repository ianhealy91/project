name: CD

on:
  # Triggered automatically when CI completes successfully on main
  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types: [ completed ]

  # Allow manual promotion trigger with environment selection
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: Release
  PROJECT_FILE: Logbook/Logbook.csproj

jobs:
  # ── Gate: Only proceed if CI passed ───────────────────────────────────
  check-ci:
    name: Verify CI Success
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI status check
        run: |
          echo "CI workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Proceeding with CD pipeline..."

  # ── Stage 1: Deploy to Staging ────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: check-ci
    # References the 'staging' GitHub Environment — requires reviewer approval
    environment:
      name: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore & Build
        run: |
          dotnet restore Logbook.sln
          dotnet build Logbook.sln --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Generate build version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_VERSION="1.0.0-${SHORT_SHA}"
          echo "build_version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

      - name: Publish application
        run: >
          dotnet publish ${{ env.PROJECT_FILE }}
          --no-build
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --output ./publish-staging

      - name: Simulate staging deployment
        run: |
          echo "======================================"
          echo " STAGING DEPLOYMENT"
          echo "======================================"
          echo " Version  : ${{ steps.version.outputs.build_version }}"
          echo " SHA      : ${{ github.sha }}"
          echo " Time     : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo " Env      : staging"
          echo "======================================"
          echo "Deployment simulation complete."
          echo "In a live implementation this step would"
          echo "transfer the artefact to the staging host."

      # Upload staging artefact for traceability
      - name: Upload staging artefact
        uses: actions/upload-artifact@v4
        with:
          name: staging-${{ steps.version.outputs.build_version }}
          path: ./publish-staging
          retention-days: 14

      # Post-deployment smoke test — verifies the published output is intact
      - name: Post-deployment smoke test
        run: |
          echo "Running smoke tests against staging artefact..."
          if [ -f "./publish-staging/Logbook.dll" ]; then
            echo "PASS: Logbook.dll present in staging artefact"
          else
            echo "FAIL: Logbook.dll missing from staging artefact"
            exit 1
          fi
          if [ -f "./publish-staging/build-manifest.json" ]; then
            echo "PASS: build-manifest.json present"
          else
            echo "WARN: build-manifest.json not found (non-blocking)"
          fi
          echo "Smoke tests passed."

      # Record deployment timestamp for DORA Deployment Frequency metric
      - name: Record staging deployment
        run: |
          echo "DORA metric capture:"
          echo "  Event           : deployment"
          echo "  Environment     : staging"
          echo "  Timestamp (UTC) : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "  Commit SHA      : ${{ github.sha }}"
          echo "  Version         : ${{ steps.version.outputs.build_version }}"
          echo "  Run ID          : ${{ github.run_id }}"

  # ── Stage 2: Deploy to Production ─────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    # References the 'production' GitHub Environment — requires manual approval
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore & Build
        run: |
          dotnet restore Logbook.sln
          dotnet build Logbook.sln --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Generate build version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_VERSION="1.0.0-${SHORT_SHA}"
          echo "build_version=${BUILD_VERSION}" >> $GITHUB_OUTPUT

      - name: Publish application
        run: >
          dotnet publish ${{ env.PROJECT_FILE }}
          --no-build
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --output ./publish-production

      - name: Simulate production deployment
        run: |
          echo "======================================"
          echo " PRODUCTION DEPLOYMENT"
          echo "======================================"
          echo " Version  : ${{ steps.version.outputs.build_version }}"
          echo " SHA      : ${{ github.sha }}"
          echo " Time     : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo " Env      : production"
          echo "======================================"
          echo "Deployment simulation complete."

      - name: Upload production artefact
        uses: actions/upload-artifact@v4
        with:
          name: production-${{ steps.version.outputs.build_version }}
          path: ./publish-production
          retention-days: 90

      - name: Post-deployment smoke test
        run: |
          echo "Running smoke tests against production artefact..."
          if [ -f "./publish-production/Logbook.dll" ]; then
            echo "PASS: Logbook.dll present in production artefact"
          else
            echo "FAIL: Logbook.dll missing from production artefact"
            exit 1
          fi
          echo "Smoke tests passed."

      # Record deployment timestamp for DORA Deployment Frequency metric
      - name: Record production deployment
        run: |
          echo "DORA metric capture:"
          echo "  Event           : deployment"
          echo "  Environment     : production"
          echo "  Timestamp (UTC) : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "  Commit SHA      : ${{ github.sha }}"
          echo "  Version         : ${{ steps.version.outputs.build_version }}"
          echo "  Run ID          : ${{ github.run_id }}"

      # Rollback instructions — documented as a manual procedure
      - name: Rollback procedure note
        run: |
          echo "======================================"
          echo " ROLLBACK PROCEDURE"
          echo "======================================"
          echo "To roll back this deployment:"
          echo "1. Identify the previous stable run ID in GitHub Actions"
          echo "2. Download the production artefact from that run"
          echo "3. Re-deploy using workflow_dispatch targeting the"
          echo "   previous commit SHA"
          echo "4. Verify smoke tests pass post-rollback"
          echo "======================================"
